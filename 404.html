<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Responsive 404 page for Stackly Health AI with clean healthcare-inspired design.">
    <meta name="theme-color" content="#0d6b5d">
    <title>404 | Stackly Health AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="error-page">
    <main class="error-simple" data-animate="fade-up">
        <a href="login.html" class="auth-brand error-brand">
            <img class="site-logo" src="assets/Logo.webp" alt="Stackly logo">
        </a>

        <div class="error-simple-card">
            <div class="error-simple-copy">
                <span class="eyebrow">Page not found</span>
                <div class="error-code">404</div>
                <h1>Page not found!</h1>
                <p>The page you are looking for does not exist. Please go back to login and continue your healthcare journey.</p>
                <div class="error-actions">
                    <a href="login.html" class="btn btn-primary">Back to Login</a>
                </div>
            </div>

            

            <div class="error-simple-image-wrap">
                <img class="error-simple-image" src="assets/404 page healthcare.webp" alt="Healthcare 404 illustration">
            </div>
        </div>
    </main>

    <a href="login.html" class="fab-button" aria-label="Go to login page">
        <span class="fab-icon">↗</span>
        <span class="fab-label">Login</span>
    </a>

    <div class="site-orbs" aria-hidden="true">
        <span class="orb orb-one"></span>
        <span class="orb orb-two"></span>
        <span class="orb orb-three"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
